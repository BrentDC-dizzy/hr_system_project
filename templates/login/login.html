<!DOCTYPE html>
<html>
<head>
    <title>UPHSD Log-in</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/login/login.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src='../../static/js/login/login.js'></script>
</head>
<body>
     <div class="container">
        <div class="left">
            <img src="../../static/img/general/uph.png" alt="Logo" class="logo"> <!-- Replace with your logo -->
            <form>
                <input type="text" placeholder="Username/Email" required>
                <input type="password" placeholder="Password" required>
                <div class="remember-forgot">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot your password?</a>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
        <div class="right-wrapper">
        <div class="right"></div>
    </div>
    </div>
</body>
</html>
