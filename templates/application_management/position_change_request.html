<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard | Employee Portal</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'img/general/uph.png' %}">
    <link rel="stylesheet" href="{% static 'css/application_management/position_change_request.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
   
</head>
<body>

    <div class="background"></div>

    <div class="sidebar" id="sidebar">
        <div class="top-section">
            <div class="logo-wrapper" id="logoToggle">
                <img src="{% static 'img/general/uph.png' %}" class="logo" alt="Logo">
                <div class="open-icon">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            <button class="close-btn" id="closeBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <ul class="menu">
            <li>
                <a href="#" class="menu-item active">
                    <i class="fas fa-border-all"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </li>
            <hr>
            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-user-edit"></i>
                    <span>Position Change Request</span>
                </a>
            </li>
            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-calendar-check"></i>
                    <span>Attendance</span>
                </a>
            </li>
            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-plane-departure"></i>
                    <span>Leave Request</span>
                </a>
            </li>
            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-star"></i>
                    <span>Performance Evaluation</span>
                </a>
            </li>
            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>Trainings</span>
                </a>
            </li>
        </ul>

        <div class="bottom-section">
            <a href="{% url 'logout' %}" class="menu-item logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Log Out</span>
            </a>
        </div>
    </div>

    
    <script src="{% static 'js/application_management/position_change_request.js' %}"></script>
</body>
</html>
