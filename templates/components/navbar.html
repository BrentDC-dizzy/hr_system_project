<style>
  .dashboard-topbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .notification-dropdown {
    position: relative;
  }

  .notification-toggle {
    position: relative;
    width: 42px;
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: #334155;
    background: #ffffff;
    border: 1px solid #dbe1ea;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .notification-toggle:hover {
    color: #0f172a;
    border-color: #c4ceda;
    box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
  }

  .notification-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 999px;
    background: #dc2626;
    color: #ffffff;
    font-size: 0.65rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    border: 2px solid #ffffff;
  }

  .notification-badge.hidden {
    display: none;
  }

  .notification-dropdown-menu {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    z-index: 1200;
    width: 350px;
    max-width: min(350px, calc(100vw - 32px));
  }

  .notification-dropdown-menu.show {
    display: block;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
</style>

<nav class="dashboard-topbar" aria-label="Dashboard notifications">
  <div class="notification-dropdown">
    <a class="notification-toggle" href="#" role="button" id="notificationDropdown" aria-expanded="false" aria-label="Toggle notifications">
      <i class="fas fa-bell" aria-hidden="true"></i>
      {% if global_unread_count > 0 %}
        <span class="notification-badge" id="notification-badge">{{ global_unread_count }}</span>
      {% else %}
        <span class="notification-badge hidden" id="notification-badge">0</span>
      {% endif %}
      <span class="sr-only">Unread notifications</span>
    </a>
    <div class="notification-dropdown-menu" aria-labelledby="notificationDropdown">
      {% include 'components/notification_list.html' %}
    </div>
  </div>
</nav>

<script>
  (function () {
    const toggle = document.getElementById('notificationDropdown');
    if (!toggle || toggle.dataset.boundNotificationDropdown === '1') {
      return;
    }

    const container = toggle.closest('.notification-dropdown');
    const menu = container ? container.querySelector('.notification-dropdown-menu') : null;
    if (!container || !menu) {
      return;
    }

    toggle.dataset.boundNotificationDropdown = '1';

    toggle.addEventListener('click', function (event) {
      event.preventDefault();
      menu.classList.toggle('show');
      toggle.setAttribute('aria-expanded', menu.classList.contains('show') ? 'true' : 'false');
    });

    document.addEventListener('click', function (event) {
      if (!container.contains(event.target)) {
        menu.classList.remove('show');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>
